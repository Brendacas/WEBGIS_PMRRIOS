<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Automação da coleta de dados - Planilha Orçamentária</title>

        <link rel="stylesheet" href="automacao.css">
    </head>
    <body>
    <nav class="barra-azul">
            <h2>Coleta de Dados - Planilha Orçamentária</h2>
    </nav>
        <main class="container-principal">
            <div class="conteudo">
                <p>Escolha o periodo</p>
                <form id="form-orse" action="/automacao" method="POST">
                    <div>
                        <label for="ano_input">Ano:</label>
                        <input type="number" id="ano_input" name="ano" placeholder="Ex: 2024" min="2000" max="2099">
                    </div>
                    <div>
                        <label for="mes_input">Mês:</label>
                        <input type="number" id="mes_input" name="mes" placeholder="Ex: 11" min="1" max="12">
                    </div>

                </div> <div class="container-button">
                    <button class="Download" type="submit">Fazer Download</button>
                </div>
                </form>
            </div>
        </main>
    </body>
</html>
